<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Loading 60 วินาที</title>
  <style>
    #content {
      display: none;
      text-align: center;
      font-size: 24px;
      margin-top: 50px;
    }
    #loading {
      text-align: center;
      font-size: 24px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

<div id="loading">กำลังโหลด... กรุณารอ 60 วินาที</div>
<div id="content">โหลดเสร็จแล้ว 🎉</div>

<script>
  setTimeout(function() {
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
  }, 60000); // 60000 ms = 60 วินาที
</script>

</body>
</html>
